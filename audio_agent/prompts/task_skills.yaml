version: 0.1
description: >
  Fine-grained task skills for tool-use routing. A skill describes an abstract
  tool chain, not a fixed model. Concrete tools are filled from reports first;
  reference-flow defaults are used only when the report has no usable ranking.

abstract_slots:
  audio_metadata:
    contract: Duration, sample rate, channel count, codec/container.
    current_catalog_defaults: ["librosa.get_audio_info", "ffmpeg.audio_stats"]
  silence_structure:
    contract: Threshold-based silence/non-silence intervals, not semantic segmentation.
    current_catalog_defaults: ["ffmpeg.silencedetect", "librosa.segment_audio"]
  speech_vad:
    contract: Speech/music/singing regions and speech activity.
    current_catalog_defaults: ["fireredvad.fireredvad_predict", "snakers4_silero-vad.vad_predict"]
  audio_event_detection:
    contract: Coarse speech/singing/music event timestamps.
    current_catalog_defaults: ["fireredvad.fireredvad_aed"]
  speech_asr:
    contract: Transcribe speech content, optionally with timestamps.
    current_catalog_defaults: ["asr_qwen3.transcribe_qwenasr", "whisperx.transcribe_audio", "fireredasr2s.transcribe_fireredasr"]
  timestamped_asr:
    contract: Transcribe speech with word/segment timestamps.
    current_catalog_defaults: ["asr_qwen3.transcribe_qwenasr_with_timestamps", "whisperx.transcribe_audio"]
  diarization:
    contract: Who-spoke-when speaker segments.
    current_catalog_defaults: ["diarizen.diarize", "whisperx.transcribe_with_diarization"]
  speaker_verification:
    contract: Same/different speaker verification between two clips.
    current_catalog_defaults: ["wespeaker.speaker_verify"]
  omni_perception:
    contract: LALM question-guided caption or direct perceptual observation.
    current_catalog_defaults: ["omni_captioner.omni_caption"]
  beat_onset:
    contract: Tempo, beat positions, onset positions; not action counts by itself.
    current_catalog_defaults: ["librosa.analyze_beats", "librosa.analyze_onsets"]
  music_pitch_harmony:
    contract: Weak low-level pitch/chroma/key/tuning features.
    current_catalog_defaults: ["librosa.analyze_pitch", "librosa.extract_chroma", "librosa.detect_key", "librosa.estimate_tuning"]
  timbre_spectral:
    contract: Low-level spectral/timbre/noisiness features.
    current_catalog_defaults: ["librosa.extract_mfcc", "librosa.analyze_spectral_features", "librosa.extract_zero_crossing_rate"]
  energy_dynamics:
    contract: RMS/volume/loudness dynamics and peaks.
    current_catalog_defaults: ["librosa.extract_rms_energy", "ffmpeg.volumedetect", "ffmpeg.ebur128"]
  source_separation:
    contract: Produce derived source-like audio stems or harmonic/percussive splits.
    current_catalog_defaults: ["librosa.separate_harmonic_percussive"]
  audio_transform:
    contract: Generate a derived clip or normalized signal for downstream tools.
    current_catalog_defaults: ["ffmpeg.trim_audio", "ffmpeg.resample_audio", "ffmpeg.convert_channels", "ffmpeg.loudnorm"]

skills:
  - id: speech.asr.clean_english_read
    task: English read-speech ASR on clean/other audiobook-style audio.
    dataset_hints: ["librispeech_clean", "librispeech_other"]
    intent_patterns: ["transcribe", "what did the speaker say", "ASR", "word error"]
    chain:
      - slot: audio_metadata
      - slot: speech_asr
      - slot: timestamped_asr
        optional: true
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "whisperx.transcribe_audio"
          reference: "ARC-Agent-NO1 tools/toolkit.py: transcribe_audio; tools.yaml fixes Whisper large-v3 for quality."
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Current catalog fallback for multilingual ASR."

  - id: speech.asr.mandarin_clean_read
    task: Mandarin read-speech ASR on clean AISHELL-style audio.
    dataset_hints: ["aishell_1"]
    intent_patterns: ["mandarin transcription", "Chinese ASR", "CER"]
    chain:
      - slot: audio_metadata
      - slot: speech_asr
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Current catalog multilingual ASR; table report gives strong Qwen/Kimi Omni-style results on AISHELL-1."
        - tool: "fireredasr2s.transcribe_fireredasr"
          reference: "Current catalog Chinese/code-switching ASR fallback."

  - id: speech.asr.codeswitch_zh_en_dialogue
    task: Mandarin-English code-switching spontaneous dialogue ASR.
    dataset_hints: ["cs_dialogue"]
    intent_patterns: ["code-switch", "mixed Chinese English", "Mandarin English dialogue"]
    chain:
      - slot: speech_vad
      - slot: speech_asr
      - slot: timestamped_asr
        optional: true
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Report Table 3 default when available; current catalog has Qwen3-ASR."
        - tool: "fireredasr2s.transcribe_fireredasr"
          reference: "Current catalog claims Chinese, English, code-switching support."

  - id: speech.asr.mandarin_dialect
    task: Mandarin and Chinese subdialect ASR.
    dataset_hints: ["kespeech"]
    intent_patterns: ["dialect", "accented mandarin", "subdialect"]
    chain:
      - slot: speech_vad
      - slot: speech_asr
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "fireredasr2s.transcribe_fireredasr"
          reference: "Closest current catalog Chinese/dialect ASR fallback."
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Current catalog multilingual fallback."

  - id: speech.asr.noisy_english
    task: English ASR under crowd/noisy broadcast conditions.
    dataset_hints: ["voxpopuli_en"]
    intent_patterns: ["noisy English", "background noise", "broadcast speech"]
    chain:
      - slot: audio_metadata
      - slot: speech_vad
      - slot: speech_asr
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "whisperx.transcribe_audio"
          reference: "ARC default high-quality ASR path."
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Current catalog fallback; report Table 3 competitive on VoxPopuli-en."

  - id: speech.asr.noise_reverb_mandarin_multispeaker
    task: Mandarin ASR with noise, reverberation, multi-speaker or in-car conditions.
    dataset_hints: ["aishell_5"]
    intent_patterns: ["reverb", "noisy car", "multi-speaker Mandarin"]
    chain:
      - slot: speech_vad
      - slot: diarization
      - slot: speech_asr
    default_bindings_from_ref_flows:
      diarization:
        - tool: "diarizen.diarize"
          reference: "Current catalog diarization."
      speech_asr:
        - tool: "fireredasr2s.transcribe_fireredasr"
          reference: "Closest current Chinese ASR fallback."
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Current catalog multilingual ASR."

  - id: speech.asr.contextual_named_entities_en
    task: English contextual ASR with hotwords, named entities, domains, or prompt context.
    dataset_hints: ["contextasr_en"]
    intent_patterns: ["hotword", "named entity", "context ASR", "proper noun"]
    chain:
      - slot: speech_asr
      - slot: omni_perception
        optional: true
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Current catalog ASR fallback; table includes Qwen3-ASR ContextASR result."
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "Current front-end LALM fallback for context-sensitive perception."

  - id: speech.asr.contextual_named_entities_zh
    task: Chinese contextual ASR with hotwords, named entities, domains, or prompt context.
    dataset_hints: ["contextasr_zh"]
    intent_patterns: ["中文热词", "专名", "上下文识别", "contextual ASR"]
    chain:
      - slot: speech_asr
      - slot: omni_perception
        optional: true
    default_bindings_from_ref_flows:
      speech_asr:
        - tool: "asr_qwen3.transcribe_qwenasr"
          reference: "Report Table 3 best current installed candidate for ContextASR-Zh."

  - id: speech.speaker_count_short
    task: Count speakers in short audio.
    dataset_hints: ["ami", "mmar_speaker"]
    intent_patterns: ["how many speakers", "number of speakers"]
    chain:
      - slot: speech_vad
      - slot: diarization
      - slot: speaker_verification
        optional: true
    default_bindings_from_ref_flows:
      diarization:
        - tool: "diarizen.diarize"
          reference: "ARC speaker category uses diarization and speaker count."
        - tool: "whisperx.transcribe_with_diarization"
          reference: "Current catalog fallback with ASR + diarization."

  - id: speech.speaker_identity_same_different
    task: Verify whether two clips contain the same speaker.
    intent_patterns: ["same speaker", "different speaker", "speaker verification"]
    chain:
      - slot: speaker_verification
    default_bindings_from_ref_flows:
      speaker_verification:
        - tool: "wespeaker.speaker_verify"
          reference: "Current catalog dedicated speaker verification."

  - id: speech.dialogue_content_structure
    task: Understand dialogue events, turns, decisions, or conversational structure.
    intent_patterns: ["who said", "conversation", "dialogue", "what happened"]
    chain:
      - slot: timestamped_asr
      - slot: diarization
      - slot: omni_perception
        optional: true
    default_bindings_from_ref_flows:
      timestamped_asr:
        - tool: "whisperx.transcribe_with_diarization"
          reference: "ARC content category uses dialogue structure + diarization."
        - tool: "asr_qwen3.transcribe_qwenasr_with_timestamps"
          reference: "Current catalog timestamped ASR."

  - id: speech.emotion_ser
    task: Speech emotion recognition or affect inference.
    dataset_hints: ["iemocap"]
    intent_patterns: ["emotion", "angry", "happy", "sad", "speaker feel"]
    chain:
      - slot: speech_asr
        optional: true
      - slot: diarization
        optional: true
      - slot: omni_perception
      - slot: energy_dynamics
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "ARC emotion category uses vocal emotion + speech LLM; current catalog has omni perception."

  - id: speech.slu_reasoning
    task: Spoken language understanding with semantic or commonsense reasoning.
    dataset_hints: ["mmsu_reason"]
    intent_patterns: ["reason", "infer", "why", "which option follows"]
    chain:
      - slot: omni_perception
      - slot: speech_asr
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "xlance and ARC both use speech LLM observations for high-level reasoning."

  - id: speech.s2tt.zh_to_en
    task: Chinese speech-to-English text translation.
    dataset_hints: ["covost2_zh2en"]
    intent_patterns: ["translate Chinese speech to English", "Zh to En"]
    chain:
      - slot: omni_perception
      - slot: speech_asr
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "Current catalog LALM fallback; report Table 4 favors Qwen3-Omni."

  - id: speech.s2tt.en_to_zh
    task: English speech-to-Chinese text translation.
    dataset_hints: ["covost2_en2zh"]
    intent_patterns: ["translate English speech to Chinese", "En to Zh"]
    chain:
      - slot: omni_perception
      - slot: speech_asr
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "Current catalog LALM fallback when report winner is unavailable."

  - id: audio.scene_environment
    task: Indoor/outdoor, environment, motion, or scene context perception.
    intent_patterns: ["indoors", "outdoors", "environment", "scene", "where"]
    chain:
      - slot: omni_perception
      - slot: timbre_spectral
        optional: true
      - slot: energy_dynamics
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "ARC scene category uses scene context + speech LLM; current catalog has omni perception."

  - id: audio.event_count_class_specific
    task: Count class-specific acoustic events such as taps, claps, knocks, beeps, or screams.
    intent_patterns: ["how many times", "count", "number of taps", "claps", "knocks"]
    chain:
      - slot: audio_event_detection
        optional: true
      - slot: beat_onset
      - slot: energy_dynamics
      - slot: omni_perception
        optional: true
    guardrails:
      - "Onset count is only a proposal; never final evidence without event-class confirmation."
      - "Use event-specific perception or ASR/omni observation to label what each onset likely is."
    default_bindings_from_ref_flows:
      beat_onset:
        - tool: "librosa.analyze_onsets"
          reference: "ARC counting category uses beat/onset plus spectral/energy."
      audio_event_detection:
        - tool: "fireredvad.fireredvad_aed"
          reference: "Current catalog coarse AED fallback."

  - id: audio.temporal_order_event_sequence
    task: Determine order of events, instruments, speakers, or actions over time.
    intent_patterns: ["first", "then", "before", "after", "order", "sequence"]
    chain:
      - slot: audio_metadata
      - slot: silence_structure
      - slot: timestamped_asr
        optional: true
      - slot: omni_perception
    default_bindings_from_ref_flows:
      silence_structure:
        - tool: "librosa.segment_audio"
          reference: "ARC timing category uses temporal and segment analysis; current catalog low-level substitute."
        - tool: "ffmpeg.silencedetect"
          reference: "Current catalog threshold silence cross-check."

  - id: audio.segment_structure_music_or_narrative
    task: Decide whether audio has one uninterrupted segment or multiple meaningful sections.
    intent_patterns: ["segment", "uninterrupted", "part", "section"]
    chain:
      - slot: audio_metadata
      - slot: silence_structure
      - slot: audio_event_detection
        optional: true
      - slot: omni_perception
        optional: true
    guardrails:
      - "silence_structure detects threshold breaks only; semantic section count needs cross-evidence."
    default_bindings_from_ref_flows:
      silence_structure:
        - tool: "ffmpeg.silencedetect"
          reference: "Cross-check for non-silence intervals."
        - tool: "librosa.segment_audio"
          reference: "Current catalog filtered non-silent intervals."

  - id: music.performance_segment_comparison
    task: Compare musical performance quality across candidate segments.
    intent_patterns: ["played best", "better performance", "which segment", "technical quality"]
    chain:
      - slot: audio_metadata
      - slot: silence_structure
      - slot: energy_dynamics
      - slot: beat_onset
      - slot: music_pitch_harmony
      - slot: omni_perception
        optional: true
    default_bindings_from_ref_flows:
      beat_onset:
        - tool: "librosa.analyze_beats"
          reference: "ARC music/timing uses beat/onset and tempo."
      music_pitch_harmony:
        - tool: "librosa.analyze_pitch"
          reference: "Current catalog weak pitch/tuning feature fallback."

  - id: music.instrument_identification
    task: Identify instrument family or active instruments.
    intent_patterns: ["instrument", "violin", "piano", "guitar", "drums"]
    chain:
      - slot: omni_perception
      - slot: source_separation
        optional: true
      - slot: timbre_spectral
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "ARC music theory has identify_instruments; current catalog lacks dedicated model."

  - id: music.rhythm_tempo_meter
    task: Tempo, beat, rhythm pattern, periodicity, or meter.
    intent_patterns: ["tempo", "BPM", "rhythm", "beat", "meter"]
    chain:
      - slot: beat_onset
      - slot: energy_dynamics
    default_bindings_from_ref_flows:
      beat_onset:
        - tool: "librosa.analyze_beats"
          reference: "ARC beat_tracking/librosa_tool default."

  - id: music.pitch_key_tuning
    task: Pitch, global key, tuning deviation, melody roughness.
    intent_patterns: ["pitch", "key", "tuning", "melody", "off-key"]
    chain:
      - slot: music_pitch_harmony
      - slot: omni_perception
        optional: true
    guardrails:
      - "Current librosa key/pitch tools are weak evidence for polyphonic music."
    default_bindings_from_ref_flows:
      music_pitch_harmony:
        - tool: "librosa.analyze_pitch"
          reference: "Current catalog pYIN pitch estimate."
        - tool: "librosa.detect_key"
          reference: "Current catalog weak global key estimate."

  - id: signal.quality_noise_reverb_distortion
    task: Audio quality, noise, reverberation, clipping, loudness, distortion.
    intent_patterns: ["quality", "noisy", "reverb", "distortion", "clipping", "loud"]
    chain:
      - slot: audio_metadata
      - slot: energy_dynamics
      - slot: timbre_spectral
      - slot: audio_transform
        optional: true
    default_bindings_from_ref_flows:
      energy_dynamics:
        - tool: "ffmpeg.volumedetect"
          reference: "Current catalog loudness/volume measurement."
        - tool: "librosa.extract_rms_energy"
          reference: "ARC signal category uses energy/spectral; current catalog substitute."

  - id: signal.stereo_spatial_channel
    task: Stereo position, channel differences, spatial movement, left/right evidence.
    intent_patterns: ["left", "right", "stereo", "channel", "spatial"]
    chain:
      - slot: audio_metadata
      - slot: audio_transform
      - slot: timbre_spectral
        optional: true
    default_bindings_from_ref_flows:
      audio_transform:
        - tool: "ffmpeg.split_channels"
          reference: "Current catalog stereo split for downstream comparison."

  - id: signal.synthetic_repetition_speed_anomaly
    task: Synthetic speech, repeated segments, speed changes, live-vs-recorded, or mechanical anomaly.
    intent_patterns: ["synthetic", "repeated", "speed up", "slowed", "recorded", "live"]
    chain:
      - slot: omni_perception
      - slot: timbre_spectral
      - slot: energy_dynamics
      - slot: silence_structure
        optional: true
    default_bindings_from_ref_flows:
      omni_perception:
        - tool: "omni_captioner.omni_caption"
          reference: "ARC signal category has dedicated anomaly tools; current catalog fallback is omni + low-level features."
