name: fireredasr2s
description: "FireRedASR2S AED - SOTA ASR for Chinese (Mandarin + 20+ dialects), English, and code-switching with word-level timestamps"
version: "1.0.0"

server:
  command: [".venv/bin/python", "server.py"]
  working_dir: "."
  env:
    MODEL_PATH: "/lihaoyu/workspace/AUDIO_AGENT/AUDIO_AGENT/models/fireredasr2s/"
    DEVICE: "auto"
  startup_timeout_sec: 300

resources:
  memory_gb: 4
  gpu: true
  cpu_cores: 2
