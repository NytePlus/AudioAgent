tool_id: "FireRedTeam/FireRedVAD"
tool_name: "FireRedVAD-VAD-AED"
task_type: "vad"
deployment_type: "local"

repo:
  url: "https://github.com/FireRedTeam/FireRedVAD"
  commit: null

weights:
  source: "huggingface"
  local_path: "/lihaoyu/workspace/AUDIO_AGENT/AUDIO_AGENT/models/fireredvad"
  required: true

environment:
  preferred_backend: "uv"
  python_version: "3.11"
  requires_gpu: false
  system_packages:
    - ffmpeg

entrypoints:
  # VAD entrypoints
  import_test: "from fireredvad import FireRedVad, FireRedVadConfig, FireRedAed, FireRedAedConfig"
  load_test: |
    from fireredvad import FireRedVad, FireRedVadConfig

    model_dir = "/lihaoyu/workspace/AUDIO_AGENT/AUDIO_AGENT/models/fireredvad/VAD"
    vad_config = FireRedVadConfig(
        use_gpu=False,
        smooth_window_size=5,
        speech_threshold=0.4,
        min_speech_frame=20,
        max_speech_frame=2000,
        min_silence_frame=20,
        merge_silence_frame=0,
        extend_speech_frame=0,
        chunk_max_frame=30000
    )
    vad = FireRedVad.from_pretrained(model_dir, vad_config)
  infer_test: |
    result, probs = vad.detect("tests/fixtures/shared/vad/en_16k_10s.wav")
  
  # AED entrypoints
  aed_load_test: |
    from fireredvad import FireRedAed, FireRedAedConfig

    model_dir = "/lihaoyu/workspace/AUDIO_AGENT/AUDIO_AGENT/models/fireredvad/AED"
    aed_config = FireRedAedConfig(
        use_gpu=False,
        smooth_window_size=5,
        speech_threshold=0.4,
        singing_threshold=0.5,
        music_threshold=0.5,
        min_event_frame=20,
        max_event_frame=2000,
        min_silence_frame=20,
        merge_silence_frame=0,
        extend_speech_frame=0,
        chunk_max_frame=30000
    )
    aed = FireRedAed.from_pretrained(model_dir, aed_config)
  aed_infer_test: |
    result, probs = aed.detect("tests/fixtures/shared/vad/en_16k_10s.wav")

fixture:
  audio: "tests/fixtures/shared/vad/en_16k_10s.wav"
  transcript: null
  language: "not_applicable"
  task_specific: true
  note: "Shared VAD fixture is used as explicit fallback; asset is 16kHz 16-bit mono PCM wav and includes speech plus non-speech regions."

io_contract:
  input_type: "audio_path"
  output_type: "json"
  primary_field: "timestamps"
  required_fields: ["timestamps"]
  nonempty_fields: ["timestamps"]
  json_serializable: true

acceptance:
  must_import: true
  must_load: true
  must_infer: true
  must_return_nonempty: true
