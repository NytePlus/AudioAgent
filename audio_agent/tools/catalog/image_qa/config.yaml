name: image_qa
description: "API-based image question answering using a vision-language model."
version: "1.0.0"
author: "Audio Agent Team"
tags: ["qa", "image", "vision", "qwen", "omni", "api"]

server:
  command: [".venv/bin/python", "server.py"]
  working_dir: "."
  env:
    DASHSCOPE_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    DEFAULT_MODEL: "qwen3-omni-flash"
    TEMPERATURE: "0.05"
    MAX_TOKENS: "1024"
  resources:
    memory_gb: 1
    gpu: false
    cpu_cores: 1
  lifecycle: "session"
  startup_timeout_sec: 60

tools:
  - name: "image_qa"
    description: "Answer a question about an image using a vision-language model."
    input_schema:
      type: object
      properties:
        image_path:
          type: string
          description: "Path to the image file to inspect."
        question:
          type: string
          description: "Question to answer based on the image."
      required: ["image_path", "question"]
