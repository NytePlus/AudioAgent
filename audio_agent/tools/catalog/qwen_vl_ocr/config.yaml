name: qwen_vl_ocr
description: "API-based OCR using Qwen VL OCR via DashScope/OpenAI-compatible API."
version: "1.0.0"
author: "Audio Agent Team"
tags: ["ocr", "image", "vision", "qwen", "api"]

server:
  command: [".venv/bin/python", "server.py"]
  working_dir: "."
  env:
    DASHSCOPE_BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    DEFAULT_MODEL: "qwen-vl-ocr"
    TEMPERATURE: "0.0"
  resources:
    memory_gb: 1
    gpu: false
    cpu_cores: 1
  lifecycle: "session"
  startup_timeout_sec: 60

tools:
  - name: "qwen_vl_ocr"
    description: "Extract readable text from an image using Qwen VL OCR via API."
    input_schema:
      type: object
      properties:
        image_path:
          type: string
          description: "Path to the image file to OCR."
        prompt:
          type: string
          description: "Optional OCR instructions."
          default: "Extract all readable text from this image. Preserve line breaks and layout when useful."
      required: ["image_path"]
