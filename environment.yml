name: audio_agent_demo
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip:
    - git+https://github.com/huggingface/transformers
    - accelerate
    - librosa
    - soundfile
    - sentencepiece
    - -e .
